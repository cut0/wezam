name: setup
description: setup

runs:
  using: composite
  steps:
    - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0
    - uses: ./.github/actions/setup-node
    - uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
      with:
        key: v1-pnpm-packages-${{ hashFiles('.tool-versions') }}-${{ hashFiles('pnpm-lock.yaml') }}
        restore-keys: |
          v1-pnpm-packages-${{ hashFiles('.tool-versions') }}-${{ hashFiles('pnpm-lock.yaml') }}
          v1-pnpm-packages-
        path: ~/.pnpm-store
    - name: Set pnpm store
      shell: bash
      run: pnpm config set store-dir ~/.pnpm-store
